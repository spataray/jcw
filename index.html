<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny Castaway - Web Homage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scene-container">
        <!-- Sky and Environment -->
        <div id="sky">
            <div id="sun-moon"></div>
            <div class="cloud-layer">
                <div class="cloud c1" style="top: 15%; animation-duration: 80s;"></div>
                <div class="cloud c2" style="top: 10%; animation-duration: 120s; animation-delay: -40s;"></div>
                <div class="cloud c3" style="top: 25%; animation-duration: 100s; animation-delay: -20s;"></div>
            </div>
        </div>

        <!-- Ocean with Parallax Layers -->
        <div id="ocean">
            <div class="ocean-layer bg-waves"></div>
            <div class="ocean-layer mid-waves"></div>
            <div class="ocean-layer fg-waves"></div>
        </div>

        <!-- The Island -->
        <div id="island">
            <div class="shoreline"></div>
            <div id="palm-tree">
                <div class="trunk"></div>
                <div class="leaves">
                    <div class="leaf f1"></div>
                    <div class="leaf f2"></div>
                    <div class="leaf f3"></div>
                    <div class="leaf f4"></div>
                    <div class="leaf f5"></div>
                </div>
            </div>
            
            <!-- Johnny -->
            <div id="johnny" class="idle">
                <div class="hair"></div>
                <div class="head"></div>
                <div class="body"></div>
                <div class="arms">
                    <div class="arm-l"></div>
                    <div class="arm-r"></div>
                    <div id="fishing-pole">
                        <div class="line"></div>
                    </div>
                </div>
                <div class="legs">
                    <div class="leg-l"></div>
                    <div class="leg-r"></div>
                </div>
                <div id="thought-bubble"></div>
            </div>

            <!-- Island Sandbox/Prop area -->
            <div id="props"></div>
        </div>
    </div>

    <!-- Audio Elements (Optional) -->
    <audio id="audio-ocean" loop>
        <source src="https://www.soundjay.com/nature/ocean-wave-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Version Tag -->
    <div id="version-tag">v1.0.1 (2026-03-25 20:25 HST)</div>

    <!-- Click to Start Overlay -->
    <div id="start-overlay">
        <div class="start-content">
            <h1>Johnny Castaway</h1>
            <p>Click anywhere to start screensaver</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
